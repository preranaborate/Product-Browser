<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product Browser</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f5f5f5;
      }
      h1 {
        margin-top: 0;
      }
      select, button {
        padding: 8px 12px;
        margin-right: 10px;
        font-size: 14px;
      }
      button {
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background-color: white;
        margin-top: 20px;
      }
      th, td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #ddd;
      }
      th {
        background-color: #f9f9f9;
        font-weight: bold;
      }
      tr:hover {
        background-color: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <h1>Product Browser</h1>
    <div>
      <select id="category">
        <option value="">All categories</option>
      </select>
      <button id="refresh">Refresh</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div>
      <button id="next">Next page</button>
    </div>
    <script>
      const rows = document.querySelector("#rows");
      const category = document.querySelector("#category");
      const refresh = document.querySelector("#refresh");
      const next = document.querySelector("#next");
      let cursor = null;

      function formatPrice(value) {
        return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(value);
      }

      function formatDate(value) {
        return new Date(value).toLocaleString();
      }

      async function loadCategories() {
        const response = await fetch("/categories");
        const categories = await response.json();
        category.innerHTML = '<option value="">All categories</option>';
        for (const item of categories) {
          const option = document.createElement("option");
          option.value = item;
          option.textContent = item;
          category.appendChild(option);
        }
      }

      async function loadProducts(reset = false) {
        if (reset) {
          cursor = null;
          rows.innerHTML = "";
        }

        const params = new URLSearchParams({ limit: "50" });
        if (category.value) params.set("category", category.value);
        if (cursor) params.set("cursor", cursor);

        const response = await fetch(`/products?${params}`);
        const page = await response.json();
        for (const product of page.items) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${product.name}</td>
            <td>${product.category}</td>
            <td>${formatPrice(product.price)}</td>
            <td>${formatDate(product.created_at)}</td>
          `;
          rows.appendChild(tr);
        }
        
        cursor = page.next_cursor;
        next.disabled = !cursor;
      }

      refresh.addEventListener("click", () => loadProducts(true));
      category.addEventListener("change", () => loadProducts(true));
      next.addEventListener("click", () => loadProducts(false));

      loadCategories().then(() => loadProducts(true));
    </script>
  </body>
</html>
